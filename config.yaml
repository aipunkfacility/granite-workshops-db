# ===== Общие настройки скрапинга =====
scraping:
  request_delay: 1.5
  timeout: 15
  max_retries: 3
  retry_min_wait: 2
  retry_max_wait: 30
  user_agent_rotation: true
  max_threads: 3

# ===== Настройки источников =====
sources:
  firecrawl:
    enabled: true
    max_retries: 3
    limit_per_query: 10
    detail_scrape_limit: 10
    queries:
      - "гранитная мастерская памятники"
      - "производство памятников гранит"
      - "мастерская по изготовлению памятников"
      - "гранит памятники надгробия"
      - "изготовление памятников из гранита"

  jsprav:
    enabled: true
    max_retries: 3
    method: "jsonld"
    categories:
      - "izgotovlenie-pamyatnikov"
      - "pamyatniki-i-nadgrobiya"
    subdomain_map:
      астрахань: "astrahan"
      москва: "moskva1"
      санкт-петербург: "sankt-peterburg1"

  dgis:
    enabled: true
    max_retries: 3
    search_category: "изготовление памятников"

  yell:
    enabled: true
    max_retries: 3
    base_path: "/catalog/izgotovlenie_pamyatnikov/"

  firmsru:
    enabled: true
    max_retries: 3
    base_path: "/{city}/izgotovlenie-pamyatnikov/"

  google_maps:
    enabled: false
    max_retries: 5
    grid_step_km: 5
    queries:
      - "гранитная мастерская"
      - "изготовление памятников"
      - "ритуальные услуги памятники"

  avito:
    enabled: false
    max_retries: 2
    category_path: "/uslugi/ritualnye_uslugi"

# ===== Дедупликация =====
dedup:
  name_similarity_threshold: 88
  phone_match_required: true
  auto_merge_same_phone: true
  auto_merge_same_site: true
  needs_review_on_address_diff: true

# ===== Обогащение =====
enrichment:
  messenger_pages:
    - "/"
    - "/contacts"
    - "/kontakty"
    - "/about"
    - "/o-nas"
    - "/katalog"
    - "/produkciya"

  tg_finder:
    check_delay: 1.5
    max_username_variants: 6
    google_search_enabled: true
    website_check_enabled: true

  tg_trust:
    empty_profile_penalty: -5

  tech_keywords:
    equipment:
      - "лазерный станок"
      - "ЧПУ"
      - "CNC"
      - "фрезерный станок"
      - "гравировальный станок"
      - "Сауно"
      - "Миртелс"
      - "Trotec"
      - "Epilog"
      - "лазерная гравировка"
      - "станок с ЧПУ"

    production:
      - "собственное производство"
      - "цех"
      - "производственная база"
      - "изготовление на заказ"
      - "работаем с гранитом"
      - "производство памятников"
      - "гранитная мастерская"

    portrait:
      - "ретушь фото"
      - "обработка портретов"
      - "фото на памятник"
      - "коррекция фото"
      - "цветная печать на граните"
      - "портрет на памятник"

    site_constructor:
      - "tilda"
      - "tildaweb"
      - "wix.com"
      - "ucoz"
      - "narod.ru"
      - "jimdo"
      - "weebly"
      - "wordpress.com"

# ===== Priority Score =====
scoring:
  telegram: 20
  whatsapp: 15
  has_production: 10
  has_cnc: 15
  has_portrait_service: 5
  is_site_constructor: -3
  no_production: -10
  map_rating_above_4: 5
  reviews_above_10: 5
  empty_tg_profile: -5

# ===== Экспорт: Smart Filters / Presets =====
export_presets:
  hot_leads:
    description: "Есть TG/WA + производство + высокий приоритет"
    filters: "telegram IS NOT NULL AND has_production = 1 AND priority_score >= 50"
    format: "csv"

  producers_only:
    description: "Производители без собственной ретуши"
    filters: "has_production = 1 AND has_portrait_service = 0 AND status != 'contacted'"
    format: "csv"

  with_telegram:
    description: "Все компании с найденным Telegram"
    filters: "telegram IS NOT NULL AND status != 'contacted'"
    format: "csv"

  cold_email:
    description: "Нет мессенджеров, но есть Email и живой сайт"
    filters: "telegram IS NULL AND whatsapp IS NULL AND email IS NOT NULL AND website_status = 200"
    format: "csv"

  manual_search:
    description: "Есть производство, но нет мессенджеров — нужен прозвон"
    filters: "has_production = 1 AND telegram IS NULL AND whatsapp IS NULL"
    format: "markdown"

  full_dump:
    description: "Все обогащённые компании"
    filters: "1=1"
    format: "json"

# ===== Логирование =====
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<7} | {name}:{function}:{line} | {message}"
  rotation: "10 MB"
  retention: "30 days"
  cities_log: true

# ===== База данных =====
database:
  path: "data/granite.db"
