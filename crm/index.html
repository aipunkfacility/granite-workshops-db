<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/dexie@3.2.7/dist/dexie.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="fl fl-col" style="height:100vh">

<!-- PAGE: AREAS -->
<div id="pageAreas" class="fl fl-col" style="height:100vh">
  <header class="px4 py3 fl ac gap3">
    <h1 style="font-size:14px;font-weight:700;color:var(--hd);display:flex;align-items:center;gap:8px">
      <i class="ri-contacts-book-2-fill" style="color:var(--acc)"></i> Mini CRM
    </h1>
    <div class="f1"></div>
    <button class="btn-icon" onclick="toggleTheme()" title="Тема">
      <i class="ri-moon-clear-fill" id="themeBtn"></i>
    </button>
    <button class="btn btn-p" onclick="ImportExport.openUpload()">
      <i class="ri-folder-upload-line"></i> CSV
    </button>
  </header>
  <main class="f1 oa" id="areasList"></main>
</div>

<!-- PAGE: CONTACTS -->
<div id="pageContacts" class="fl fl-col" style="display:none;height:100vh">
  <header class="px4 py2 fl ac gap3">
    <button class="btn btn-s" onclick="State.goAreas()">
      <i class="ri-arrow-left-line"></i> Назад
    </button>
    <h2 id="areaTitle" style="font-size:14px;font-weight:700;color:var(--hd)"></h2>
    <div class="f1"></div>
    <div class="rel">
      <i class="ri-search-line abs" style="left:8px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:13px"></i>
      <input type="text" id="searchInp" class="inp" style="padding-left:30px;width:160px" placeholder="Поиск...">
    </div>
    <button class="btn-icon" onclick="toggleTheme()" title="Тема">
      <i class="ri-moon-clear-fill"></i>
    </button>
    <button class="btn btn-s" onclick="ImportExport.openExportDD(event)">
      <i class="ri-file-download-line"></i> XLSX
    </button>
    <div id="exportDD" class="expdd" style="display:none">
      <div class="expdd-item" onclick="ImportExport.doExport('all')">Все контакты</div>
      <div class="expdd-item" onclick="ImportExport.doExport('active')">Без архива</div>
    </div>
  </header>
  <div id="fieldToggles" class="px4 py1 fl ac gap2" style="background:var(--bg2);border-bottom:1px solid var(--bdr)"></div>
  <div id="channelTabs" class="ch-tabs"></div>
  <main class="f1 oa" id="checklistContainer"></main>
  <footer id="statsFooter" class="px4 py2" style="display:none">
    <div class="fl ac gap2" id="statsBar"></div>
  </footer>
</div>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="ov" style="display:none"></div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/db.js"></script>
<script src="js/render.js"></script>
<script src="js/batch.js"></script>
<script src="js/import-export.js"></script>

<script>
function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('crm-t', document.documentElement.classList.contains('light') ? 'l' : 'd');
  syncThemeIcons();
}

function syncThemeIcons() {
  const isLight = document.documentElement.classList.contains('light');
  document.querySelectorAll('#themeBtn, [onclick="toggleTheme()"] i').forEach(e => {
    e.className = isLight ? 'ri-moon-line' : 'ri-moon-clear-fill';
  });
}

if (localStorage.getItem('crm-t') === 'l') {
  document.documentElement.classList.add('light');
}

function toggleField(k) {
  State.toggleField(k);
  Render.renderFieldToggles();
  Render.renderChecklist();
}

document.addEventListener('click', function (e) {
  if (!e.target.closest('#exportDD') && !e.target.closest('[onclick*="openExportDD"]')) {
    ImportExport.closeExportDD();
  }
});

document.addEventListener('DOMContentLoaded', async function () {
  try {
    syncThemeIcons();
    await initDB();
    console.log('DB ready:', await db.contacts.count());
    Render.renderAreas();

    const searchInp = document.getElementById('searchInp');
    const debouncedSearch = debounce(function (e) {
      State.setSearch(e.target.value);
      Render.renderChecklist();
    }, SEARCH_DEBOUNCE_MS);
    searchInp.addEventListener('input', debouncedSearch);
  } catch (err) {
    console.error(err);
    document.getElementById('areasList').innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><div class="empty-state-title">Ошибка БД</div><div class="empty-state-desc">' + esc(err.message) + '</div></div>';
  }
});
</script>
</body>
</html>
