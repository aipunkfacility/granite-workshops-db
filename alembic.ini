# alembic.ini — конфигурация Alembic
# sqlalchemy.url задаётся динамически в env.py из config.yaml / DATABASE_URL

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Используем двухфазные транзакции для безопасности
# (SQLite это эмулирует через journal_mode=WAL)
use_two_phase = false

# Шаблон для файлов миграций
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Интервал между ревизиями (по умолчанию)
# timezone = UTC

# Логирование
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
